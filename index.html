<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>Budget</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Budget</h1>
    <button id="whoChip" class="chip" title="Tap to switch who's logging"><span id="whoName">—</span> <span class="swap">⇄</span></button>
  </header>

  <main>
    <!-- DASHBOARD -->
    <section id="view-dash" class="view active">
      <div id="pastBanner" class="banner past" hidden></div>

      <div class="monthnav">
        <button id="prevMonth" class="navbtn" aria-label="Previous month">‹</button>
        <span id="monthLabel" class="monthlabel">…</span>
        <button id="nextMonth" class="navbtn" aria-label="Next month">›</button>
      </div>

      <div id="overBanner" class="banner over" hidden></div>

      <div id="summary" class="summary"></div>

      <div class="seg" role="tablist" aria-label="View">
        <button id="segCat" class="seg-btn active" role="tab">Categories</button>
        <button id="segPerson" class="seg-btn" role="tab">By person</button>
      </div>

      <div id="cats" class="cats"></div>
      <div id="people" class="people" hidden></div>

      <h2 class="sec-title">Recent</h2>
      <div id="recent" class="recent"></div>

      <p id="dashMsg" class="msg"></p>
    </section>

    <!-- ADD / EDIT -->
    <section id="view-add" class="view">
      <div id="editBanner" class="banner edit" hidden>
        Editing transaction — <button type="button" id="cancelEdit" class="lnk">cancel</button>
      </div>
      <form id="addForm">
        <label>Amount (R)
          <input id="amount" type="text" inputmode="numeric" pattern="[0-9]*[.,]?[0-9]*" placeholder="0" autocomplete="off" required />
        </label>

        <div class="field">
          <span class="field-label">Category</span>
          <div id="catChips" class="cat-chips" role="listbox" aria-label="Category"></div>
          <input id="category" type="hidden" />
        </div>

        <button type="button" id="toggleNote" class="disclosure">+ Add note</button>
        <label id="noteWrap" hidden>Note
          <input id="note" type="text" placeholder="e.g. Checkers" autocomplete="off" />
        </label>

        <button type="button" id="togglePhoto" class="disclosure">+ Attach slip</button>
        <label id="photoWrap" hidden>Slip photo
          <input id="photo" type="file" accept="image/*" capture="environment" />
        </label>
        <img id="preview" class="preview" alt="" hidden />

        <button id="saveBtn" type="submit" class="savebtn">Save</button>
        <p id="addMsg" class="msg"></p>
      </form>
    </section>

    <!-- SETTINGS -->
    <section id="view-set" class="view">
      <p class="hint">Setup only — fill this in once per phone. Ask Iain for the URL &amp; token.</p>
      <form id="setForm">
        <label>Apps Script Web App URL
          <input id="scriptUrl" type="url" placeholder="https://script.google.com/macros/s/…/exec" required />
        </label>
        <label>Secret token
          <input id="token" type="password" placeholder="the TOKEN from setup" autocomplete="off" required />
        </label>
        <label>Who is this phone?
          <select id="who">
            <option value="" disabled selected>Choose…</option>
            <option>Iain</option>
            <option>Simone</option>
          </select>
        </label>
        <button type="submit" class="savebtn">Save &amp; connect</button>
        <p id="setMsg" class="msg"></p>
      </form>
    </section>
  </main>

  <nav class="tabbar">
    <button data-view="dash" class="active">Budget</button>
    <button data-view="add" class="fab">＋ Add</button>
    <button data-view="set">Settings</button>
  </nav>

  <div id="snack" class="snack" hidden></div>

  <script src="app.js"></script>
</body>
</html>
