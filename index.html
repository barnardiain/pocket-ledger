<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>Budget</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1 id="monthLabel">Budget</h1>
    <button id="whoChip" class="chip" title="Tap to switch who's logging">—</button>
  </header>

  <main>
    <!-- DASHBOARD -->
    <section id="view-dash" class="view active">
      <div id="summary" class="summary"></div>
      <div id="cats" class="cats"></div>
      <p id="dashMsg" class="msg"></p>
    </section>

    <!-- ADD -->
    <section id="view-add" class="view">
      <form id="addForm">
        <label>Amount (R)
          <input id="amount" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0.00" required />
        </label>
        <label>Category
          <select id="category" required></select>
        </label>
        <label>Note (optional)
          <input id="note" type="text" placeholder="e.g. Checkers" />
        </label>
        <label>Slip photo (optional)
          <input id="photo" type="file" accept="image/*" capture="environment" />
        </label>
        <img id="preview" class="preview" alt="" hidden />
        <button id="saveBtn" type="submit">Save</button>
        <p id="addMsg" class="msg"></p>
      </form>
    </section>

    <!-- SETTINGS -->
    <section id="view-set" class="view">
      <form id="setForm">
        <label>Apps Script Web App URL
          <input id="scriptUrl" type="url" placeholder="https://script.google.com/macros/s/…/exec" required />
        </label>
        <label>Secret token
          <input id="token" type="text" placeholder="the TOKEN from Code.gs" required />
        </label>
        <label>Who is this phone?
          <select id="who">
            <option>Iain</option>
            <option>Simone</option>
          </select>
        </label>
        <button type="submit">Save &amp; connect</button>
        <p id="setMsg" class="msg"></p>
      </form>
      <p class="hint">Settings are stored only on this phone. Enter the same URL &amp; token on both phones.</p>
    </section>
  </main>

  <nav class="tabbar">
    <button data-view="dash" class="active">Budget</button>
    <button data-view="add" class="fab">＋ Add</button>
    <button data-view="set">Settings</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
